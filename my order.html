<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Orders</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{
text-align:center;
}

.order{
background:white;
padding:15px;

border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</head>

<body>

<h2>My Orders</h2>

<div id="orders"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyDTE0xbXt4YpmOzFn65tnnV0kZpYqAFScM",
authDomain: "omyra-920d4.firebaseapp.com",
databaseURL: "https://omyra-920d4-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "omyra-920d4",
storageBucket: "omyra-920d4.firebasestorage.app",
messagingSenderId: "487662181835",
appId: "1:487662181835:web:f8e1f7e4eec60a6e6aaa4e"

};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const orderBox=document.getElementById("orders")

onValue(ref(db,"orders"),(snapshot)=>{

orderBox.innerHTML=""

snapshot.forEach((child)=>{

let data=child.val()

orderBox.innerHTML+=`

<div class="order">

<h3>${data.food}</h3>

<p>Name : ${data.name}</p>

<p>Mobile : ${data.mobile}</p>

<p>Address : ${data.address}</p>

<p>Payment : ${data.payment}</p>

<p>Status : ${data.status}</p>

</div>

`

})

})

</script>

</body>
