<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Omyra Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e9f5ee;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:320px;
background:white;
border-radius:25px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#1b7a46;
margin-bottom:10px;
}

h2{
color:#1b7a46;
margin-bottom:5px;
}

p{
color:gray;
font-size:14px;
}

.inputBox{
margin-top:15px;
position:relative;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#e9f5ee;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:25px;
background:#1b7a46;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#145c34;
}

.google{
background:white;
color:#333;
border:1px solid #ccc;
}

.link{
margin-top:10px;
font-size:14px;
}

a{
color:#1b7a46;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">Omyra Food</div>

<h2>Welcome Back</h2>

<p>Login to your account</p>

<div class="inputBox">
<input type="email" id="email" placeholder="Email">
</div>

<div class="inputBox">
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="login()">Login</button>

<button class="google">Login with Google</button>

<div class="link">
Don't have account? <a href="#">Sign Up</a>
</div>

</div>

</body>

<script>

function togglePassword(){

let pass=document.getElementById("password")

if(pass.type==="password"){
pass.type="text"
}else{
pass.type="password"
}

}

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDTE0xbXt4YpmOzFn65tnnV0kZpYqAFScM",
authDomain: "omyra-920d4.firebaseapp.com",
databaseURL: "https://omyra-920d4-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "omyra-920d4",
storageBucket: "omyra-920d4.firebasestorage.app",
messagingSenderId: "487662181835",
appId: "1:487662181835:web:f8e1f7e4eec60a6e6aaa4e"
};


const app=initializeApp(firebaseConfig)

const auth=getAuth(app)


/* AUTO LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

window.location="omyra.html"

}

})


/* EMAIL LOGIN */

document.getElementById("loginBtn").onclick=function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Login Successful")

window.location="omyra.html"

})

.catch((error)=>{

alert(error.message)

})

}


/* GOOGLE LOGIN */

const provider=new GoogleAuthProvider()

document.getElementById("googleBtn").onclick=function(){

signInWithPopup(auth,provider)

.then(()=>{

alert("Google Login Success")

window.location="omyra.html"

})

.catch((error)=>{

alert(error.message)

})

}

</script>

</body>

</html>
