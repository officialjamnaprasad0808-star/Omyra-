<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Help Us - Omyra</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ff6a00,#ffcc00,#ff3cac);
color:white;
text-align:center;
}

/* HEADER */

header{

padding:30px;

}

header h1{

font-size:36px;

text-shadow:0 0 15px white;

}

/* BOX */

.container{

width:90%;

max-width:400px;

margin:auto;

}

.card{

background:rgba(255,255,255,0.2);

margin:20px 0;

padding:20px;

border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,0.4);

transition:0.3s;

}

.card:hover{

transform:scale(1.05);

box-shadow:0 0 20px yellow;

}

/* BUTTON */

button{

margin-top:10px;

padding:10px 20px;

border:none;

background:#ff3300;

color:white;

border-radius:10px;

cursor:pointer;

font-size:16px;

}

button:hover{

box-shadow:0 0 15px red;

}

</style>

</head>

<body>

<header>

<h1>Help & Support</h1>

<p>We are here to help you</p>

</header>

<div class="container">

<div class="card">

<h3>📞 Customer Care</h3>

<p>Call us for any problem</p>

<a href="tel:9131348998">

<button>Call Now</button>

</a>

</div>

<div class="card">

<h3>💬 WhatsApp Support</h3>

<p>Chat with us on WhatsApp</p>

<a href="https://wa.me/919131348998">

<button>Chat Now</button>

</a>

</div>

<div class="card">

<h3>📧 Email Support</h3>

<p>omyrafood@gmail.com</p>

</div>

</div>

</body>

</html>
