<!DOCTYPE html>
<html>

<head>

<title>Omyra Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2,#ff6a00);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* HOME BUTTON */

.home{
position:absolute;
top:20px;
right:20px;
background:#fff;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
color:#333;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* CARD */

.card{
background:white;
width:340px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

/* AVATAR */

.avatar{
width:100px;
border-radius:50%;
margin-bottom:10px;
}

h2{
color:#ff6a00;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* SAVE */

.save{
background:#ff6a00;
color:white;
}

/* LOGOUT */

.logout{
background:#333;
color:white;
}

</style>

</head>

<body>

<a class="home" href="omyra.html">🏠 Home</a>

<div class="card">

<img class="avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h2>My Profile</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="phone" placeholder="Mobile Number">

<select id="location">

<option value="">Select Location</option>
<option>Gorakhpur</option>
<option>Nariya</option>
<option>Khamariya</option>
<option>Dhariya</option>
<option>Bichua</option>
<option>Kodaras</option>
<option>Chawrpatha</option>

</select>

<button class="save" onclick="saveProfile()">Save Profile</button>

<button class="logout" onclick="logoutUser()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDTE0xbXt4YpmOzFn65tnnV0kZpYqAFScM",
authDomain: "omyra-920d4.firebaseapp.com",
databaseURL: "https://omyra-920d4-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "omyra-920d4",
storageBucket: "omyra-920d4.firebasestorage.app",
messagingSenderId: "487662181835",
appId: "1:487662181835:web:f8e1f7e4eec60a6e6aaa4e"

};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const auth=getAuth(app)

/* SAVE PROFILE */

window.saveProfile=function(){

let user=auth.currentUser

if(!user){

alert("Please Login First")
return

}

let uid=user.uid

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let location=document.getElementById("location").value

set(ref(db,"users/"+uid),{

name:name,
phone:phone,
location:location

})
.then(()=>{

alert("Profile Saved")

})

}

/* LOAD PROFILE */

onAuthStateChanged(auth,(user)=>{

if(user){

let uid=user.uid

get(child(ref(db),"users/"+uid)).then((snap)=>{

if(snap.exists()){

document.getElementById("name").value=snap.val().name || ""
document.getElementById("phone").value=snap.val().phone || ""
document.getElementById("location").value=snap.val().location || ""

}

})

}

})

/* LOGOUT + DELETE DATA */

window.logoutUser=function(){

let confirmLogout=confirm("Are you sure you want to logout?")

if(confirmLogout){

let user=auth.currentUser

if(user){

remove(ref(db,"users/"+user.uid))

}

signOut(auth).then(()=>{

alert("Logged Out")
window.location="login.html"

})

}

}

</script>

</body>

</html>
