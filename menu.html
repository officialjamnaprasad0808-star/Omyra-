<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Omyra Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ff6a00,#ffcc00,#ff3cac);
color:white;
}

/* TITLE */

header{
text-align:center;
padding:25px;
}

header h1{
font-size:36px;
text-shadow:0 0 15px white;
}

/* MENU GRID */

.menu{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

padding:20px;

}

/* CARD */

.card{

background:white;

color:black;

border-radius:15px;

overflow:hidden;

box-shadow:0 0 15px rgba(0,0,0,0.4);

position:relative;

transition:0.3s;

}

.card:hover{

transform:scale(1.05);

box-shadow:0 0 25px #ff6600;

}

/* IMAGE */

.card img{

width:100%;

height:150px;

object-fit:cover;

}

/* INFO */

.info{

padding:10px;

text-align:center;

}

.price{

color:#ff3300;

font-weight:bold;

margin-top:5px;

}

/* ORDER BUTTON */

.order{

position:absolute;

bottom:-60px;

left:0;

width:100%;

text-align:center;

transition:0.4s;

}

.card:hover .order{

bottom:10px;

}

button{

background:#ff6600;

color:white;

border:none;

padding:10px 20px;

border-radius:10px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#ff3300;

box-shadow:0 0 15px #ff3300;

}

</style>

</head>

<body>

<header>

<h1>Omyra Menu</h1>

<p>Fresh Snacks Available</p>

</header>

<div class="menu">

<!-- SAMOSA -->

<div class="card">

<img src="samosa.jpg">

<div class="info">

<h3>Samosa</h3>

<p class="price">₹20</p>

</div>

<div class="order">

<button>Order Now</button>

</div>

</div>

<!-- JALEBI -->

<div class="card">

<img src="jalebi.jpg">

<div class="info">

<h3>Jalebi</h3>

<p class="price">₹30</p>

</div>

<div class="order">

<button>Order Now</button>

</div>

</div>

<!-- MOGODI -->

<div class="card">

<img src="mogodi.jpg">

<div class="info">

<h3>Mogodi</h3>

<p class="price">₹25</p>

</div>

<div class="order">

<button>Order Now</button>

</div>

</div>

<!-- AALU BANDA -->

<div class="card">

<img src="banda.jpg">

<div class="info">

<h3>Aalu Banda</h3>

<p class="price">₹20</p>

</div>

<div class="order">

<button>Order Now</button>

</div>

</div>

</div>

</body>

</html>
